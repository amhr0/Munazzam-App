version: '3.8'

services:
  # قاعدة البيانات MongoDB
  mongodb:
    image: mongo:5
    container_name: munazzam-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: munazzam
    networks:
      - munazzam-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # الذاكرة السريعة (Redis Queue)
  redis:
    image: redis:alpine
    container_name: munazzam-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - munazzam-network

  # الخادم (Backend)
  backend:
    build: ./server
    container_name: munazzam-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/munazzam
      - REDIS_HOST=redis
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - munazzam-network

  # العامل الذكي (The Worker) - يعالج الفيديوهات والملفات الثقيلة
  worker:
    build: ./server
    container_name: munazzam-worker
    command: node worker.js
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/munazzam
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_started
      mongodb:
        condition: service_healthy
    volumes:
      - ./server/uploads:/app/uploads
      - ./knowledge_base:/app/knowledge_base
    networks:
      - munazzam-network

  # الواجهة الأمامية (Frontend)
  frontend:
    build: 
      context: ./client
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: munazzam-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - munazzam-network

volumes:
  mongo-data:
    driver: local

networks:
  munazzam-network:
    driver: bridge
